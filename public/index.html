<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYBRIDE-MD | CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; font-family: 'Share Tech Mono', monospace; color: #00f2ff; overflow: hidden; }
        .glass { background: rgba(0, 242, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.2); backdrop-filter: blur(15px); }
        .glitch { font-family: 'Orbitron', sans-serif; text-shadow: 2px 2px #ff0055, -2px -2px #00f2ff; }
        .input-cyber { background: #000; border: 1px solid #333; color: #00f2ff; text-align: center; }
        .input-cyber:focus { border-color: #00f2ff; outline: none; box-shadow: 0 0 15px #00f2ff; }
        .btn-core { background: #00f2ff; color: #000; font-weight: bold; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%); transition: 0.3s; }
        .btn-core:hover { transform: scale(1.05); box-shadow: 0 0 20px #00f2ff; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="glass max-w-md w-full rounded-3xl p-10 relative border-t-4 border-cyan-500">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold glitch mb-2">HYBRIDE-MD</h1>
            <p class="text-[10px] tracking-[0.4em] opacity-50 uppercase">Session Core Protocol</p>
        </div>
        <div class="space-y-6">
            <input type="text" id="num" placeholder="22376016473" class="w-full p-4 rounded-lg input-cyber text-2xl">
            <button onclick="getPair()" id="run" class="w-full btn-core py-4 text-xl uppercase italic">Initiate Core</button>
        </div>
        <div id="loader" class="hidden mt-6 text-center animate-pulse text-xs">COMMUNICATION AVEC LE NOYAU...</div>
        <div id="result" class="hidden mt-8 p-6 border border-cyan-500/30 rounded-xl bg-cyan-950/10">
            <p class="text-[10px] text-center mb-4 opacity-60">AUTH PAIRING CODE</p>
            <div id="code" class="text-5xl text-center font-bold tracking-widest text-white mb-6">---- ----</div>
            <div class="text-[11px] opacity-70 border-t border-cyan-900 pt-4">
                1. WhatsApp > Appareils connectés > Jumeler avec un numéro.<br>
                2. Entrez le code ci-dessus.<br>
                <span class="text-cyan-400">3. Votre SESSION_ID sera envoyé en PV WhatsApp.</span>
            </div>
        </div>
    </div>
    <script>
        async function getPair() {
            const n = document.getElementById('num').value;
            if(!n) return alert("Numéro requis !");
            document.getElementById('run').innerText = "WAITING...";
            document.getElementById('loader').classList.remove('hidden');
            try {
                const r = await fetch(`/api/generate?number=${n}`);
                const d = await r.json();
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('result').classList.remove('hidden');
                document.getElementById('code').innerText = d.code;
            } catch(e) { alert("Erreur Core"); }
        }
    </script>
</body>
</html>
